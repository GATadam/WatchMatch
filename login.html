<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WATCHMATCH - Login</title>
    <link rel="stylesheet" href="login.css">
    <script src='functions.js' defer></script>       
</head>
<body>
        <div class="container">
            <div class="tabs">
                <button id="tab-login" class="tab active">Login</button>
                <button id="tab-register" class="tab">Create Account</button>
            </div>
        
            <div id="login" class="panel active">
                <form method="POST">
                    <!--  Ahogy láttam, ezek majd kelleni fognak a form tag-jébe: action="../login.php" novalidate -->
                    <div class="field">
                        <label for="email_login">Email</label>
                        <input id="email_login" name="email" type="email" required />
                        <!-- A required-et nyelvesíteni kell! -->
                    </div>
                    <div class="field">
                        <label for="password_login">Password</label>
                        <div class="password-container">
                            <input id="password_login" name="password" type="password" minlength="8" required />
                            <img src="https://www.kosmicdoom.com/watchmatch_media/show_pw.svg" alt="Show password" class="eye-icon" />
                        </div>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
                <p class="hint">Don't have an account yet? Create one for free.</p>
            </div>
        
            <div id="register" class="panel">
                <form method="POST">
                    <!-- Ide is: action="../register.php" novalidate -->
                    <div class="field">
                        <label for="name">User name</label>
                        <input id="name" name="name" type="text" required />
                    </div>
                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" required />
                    </div>
                    <div class="field">
                        <label for="password">Password (min. 8 character)</label>
                        <div class="password-container">
                            <input id="password" name="password" type="password" minlength="8" required />
                            <img src="https://www.kosmicdoom.com/watchmatch_media/show_pw.svg" alt="Show password" class="eye-icon" />
                        </div>
                    </div>
                    <button type="submit" class="btn">Register</button>
                    <p class="hint">After registration, you will receive a confirmation link by email.</p>
                </form>
            </div>
        </div>
</body>
</html>
